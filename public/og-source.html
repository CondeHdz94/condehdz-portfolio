<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>og.png source — Camilo Conde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
}

/* ── Toggle — fixed fuera del card, no entra en el screenshot ── */
.toggle-ui {
  position: fixed;
  bottom: -40px;   /* fuera del viewport de 630px */
  left: 0;
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.7);
  font-family: monospace;
  font-size: 11px;
  color: #fff;
  z-index: 999;
}
.toggle-ui button {
  font-family: monospace;
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
}
.toggle-ui button.active { background: rgba(255,255,255,0.4); }

/* ── Card ───────────────────────────────────────────── */
.card {
  width: 1200px;
  height: 630px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 64px 88px 60px;

  --bg:     #FAFAF9;
  --strong: #1C1917;
  --text:   #57534E;
  --muted:  #736D67;
  --faint:  #9E9891;
  --line:   #E4E2DC;
  --green:  #15803D;

  background: var(--bg);
  font-family: 'Epilogue', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.card.dark {
  --bg:     #0D0A08;
  --strong: #F5F5F4;
  --text:   #A89E98;
  --muted:  #8F8980;
  --faint:  #5A5552;
  --line:   #2B2420;
  --green:  #4ADE80;
  background: var(--bg);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--strong);
}

.card::after {
  content: 'CC';
  position: absolute;
  right: -24px;
  bottom: -180px;
  font-size: 560px;
  font-weight: 900;
  letter-spacing: -0.07em;
  line-height: 1;
  color: var(--strong);
  opacity: 0.055;
  pointer-events: none;
}

.top {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  z-index: 1;
}

.top-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.name {
  font-size: 148px;
  font-weight: 900;
  letter-spacing: -0.045em;
  line-height: 0.93;
  color: var(--strong);
  z-index: 1;
}

.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  z-index: 1;
}

.bottom-left {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.subtitle {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.tagline {
  font-size: 16px;
  color: var(--text);
  letter-spacing: 0.01em;
}

.url {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--faint);
  letter-spacing: 0.06em;
  white-space: nowrap;
  align-self: flex-end;
}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="top">
    <span class="top-dot"></span>
    <span>Camilo Conde · Portfolio</span>
  </div>

  <h1 class="name">Camilo<br>Conde</h1>

  <div class="bottom">
    <div class="bottom-left">
      <p class="subtitle">Design Engineer · Cali, Colombia</p>
      <p class="tagline">Building at the intersection of design and code.</p>
    </div>
    <span class="url">condehdz-portfolio.vercel.app</span>
  </div>
</div>

<!-- Toggle fuera del viewport de 630px — no entra en el screenshot -->
<div class="toggle-ui">
  <button class="active" onclick="setMode('light',this)">Light</button>
  <button onclick="setMode('dark',this)">Dark</button>
</div>

<script>
// Leer ?dark=1 en la URL para pre-seleccionar modo
if (new URLSearchParams(location.search).get('dark') === '1') {
  document.getElementById('card').classList.add('dark')
  document.querySelectorAll('.toggle-ui button')[1].classList.add('active')
  document.querySelectorAll('.toggle-ui button')[0].classList.remove('active')
}

function setMode(mode, btn) {
  document.getElementById('card').classList.toggle('dark', mode === 'dark')
  document.querySelectorAll('.toggle-ui button').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}
</script>

</body>
</html>
